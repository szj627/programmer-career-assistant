# Canonical tracker states.
# Keep labels stable because scripts and dashboard read them.

states:
  - id: evaluated
    label: Evaluated
    aliases: [已评估, 评估完成]
    description: 已完成职位评估，等待决定
    dashboard_group: evaluated

  - id: applied
    label: Applied
    aliases: [已投递, 已申请]
    description: 用户已提交申请
    dashboard_group: applied

  - id: responded
    label: Responded
    aliases: [已回复, 有回应]
    description: 招聘方已有回应，尚未进入面试
    dashboard_group: responded

  - id: interview
    label: Interview
    aliases: [面试中, 面试]
    description: 正在面试流程中
    dashboard_group: interview

  - id: offer
    label: Offer
    aliases: [收到 offer, offer]
    description: 已收到 offer
    dashboard_group: offer

  - id: rejected
    label: Rejected
    aliases: [已拒绝, 被拒]
    description: 招聘方拒绝
    dashboard_group: rejected

  - id: discarded
    label: Discarded
    aliases: [已放弃, 已关闭, 不考虑]
    description: 用户放弃或岗位关闭
    dashboard_group: discarded

  - id: skip
    label: SKIP
    aliases: [跳过, 不投, 不建议投递]
    description: 不匹配，不建议投递
    dashboard_group: skip
